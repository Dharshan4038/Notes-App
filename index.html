<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://kit.fontawesome.com/5c39543b75.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="notes">
            <div class="saved-notes">
                <div class="btn-div"><button class="btn" id="btn">Add Note</button></div>
                <div class="left-content">
                     <!-- <div class="left-notes">
                        <h4 id="title">A Sample Note</h4>
                        <p id="body">Lorem ipsum dolor sit, amet consectetur adipisicing elit.</p>
                        <small class="date" id="date">Thursday, 8 July 2021 at 20:06</small> 
                    </div>  -->
                </div>
            </div>
            <div class="vl"></div>
            <div class="note-pad">
                <input class="notes-title" type="text" placeholder="A Sample Note...">
                <textarea class="notes-body" cols="20" rows="42" charswidth="200" name="text_body" placeholder="This is Body..."></textarea>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
